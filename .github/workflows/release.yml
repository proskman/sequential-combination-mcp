# GitHub Actions — Auto-Build & Release Workflow
# ================================================
# Ce workflow compile automatiquement le projet Rust pour 3 plateformes
# et publie les binaires dans la section "Releases" de GitHub.

name: Build & Release

on:
  push:
    branches: [main]
  tags:
    - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sequential-combination-rs

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sequential-combination-rs.exe
            asset_name: sequential-combination-rs-windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sequential-combination-rs
            asset_name: sequential-combination-rs-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sequential-combination-rs
            asset_name: sequential-combination-rs-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release optimisé)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: Create GitHub Release with all binaries
        uses: softprops/action-gh-release@v2
        with:
          name: "🦀 Sequential Combination MCP ${{ github.ref_name }}"
          body: |
            ## 🚀 Sequential Combination MCP — Rust Port ${{ github.ref_name }}
            
            ### Installation (aucun Rust ou Python requis)
            1. Téléchargez le binaire pour votre OS.
            2. Configurez votre `mcp_config.json`.
          files: |
            binaries/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
