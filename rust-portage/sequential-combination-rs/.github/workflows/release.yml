# GitHub Actions — Auto-Build & Release Workflow
# ================================================
# Ce workflow compile automatiquement le projet Rust pour 3 plateformes
# et publie les binaires dans la section "Releases" de GitHub.
#
# Déclencheurs :
#   - Push sur 'main' → build de test
#   - Creation d'un tag v*.*.* → build + publication de la release
#
# Résultat : Les utilisateurs téléchargent .exe (Windows) ou le binaire
# (Linux/macOS) sans jamais avoir besoin d'installer Rust sur leur machine.

name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sequential-combination-rs

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — .exe binaire prêt à l'emploi
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sequential-combination-rs.exe
            asset_name: sequential-combination-rs-windows-x64.exe

          # Linux — binaire natif
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sequential-combination-rs
            asset_name: sequential-combination-rs-linux-x64

          # macOS (Apple Silicon + Intel)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sequential-combination-rs
            asset_name: sequential-combination-rs-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache des dépendances Cargo (accélère les builds suivants ~80%)
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release optimisé)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Ne s'exécute QUE sur un tag de type v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: Create GitHub Release with all binaries
        uses: softprops/action-gh-release@v2
        with:
          name: "🦀 Sequential Combination MCP ${{ github.ref_name }}"
          body: |
            ## 🚀 Sequential Combination MCP — Rust Port ${{ github.ref_name }}

            ### Installation (aucun Rust ou Python requis)
            1. Téléchargez le binaire correspondant à votre système :
               - 🪟 **Windows** : `sequential-combination-rs-windows-x64.exe`
               - 🐧 **Linux** : `sequential-combination-rs-linux-x64`
               - 🍎 **macOS** : `sequential-combination-rs-macos-arm64`
            2. Ajoutez dans votre `mcp_config.json` :
            ```json
            {
              "mcpServers": {
                "sequential-combination-rs": {
                  "command": "/chemin/vers/sequential-combination-rs.exe",
                  "env": { "MCP_BASE_DIR": "/chemin/vers/le/dossier" }
                }
              }
            }
            ```
            3. Reliez votre dossier `skills/` à `antigravity-awesome-skills`.

            ### Améliorations vs Python
            - ✅ Zéro installation (pas de pip, venv, Python)
            - ✅ Démarrage en < 500ms (vs 5-15s en Python)
            - ✅ Plus de restart loop (logs vers stderr uniquement)
          files: |
            binaries/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
